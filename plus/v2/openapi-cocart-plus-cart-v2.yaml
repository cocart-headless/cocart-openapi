openapi: 3.0.3
info:
  title: CoCart Plus - Cart API v2
  version: 2.0.0
  description: |
    CoCart Plus extends the CoCart REST API v2 with additional cart endpoints for
    the mini cart, coupons, fees, removing all items and setting shipping methods.

    Requires CoCart core v5.0+ to be installed and active.

    When the geolocation feature is enabled, responses include `Country`,
    `Country-Code`, `Region` and `Timezone` headers.
    When rate limiting is enabled, responses include `RateLimit-Limit`,
    `RateLimit-Remaining` and `RateLimit-Reset` headers (plus `RateLimit-Retry-After`
    on 429 responses).
  termsOfService: https://cocartapi.com/terms-of-conditions-polar/
  contact:
    email: support@cocartapi.com
  license:
    name: GNU General Public License v3.0
    url: http://www.gnu.org/licenses/gpl-3.0.html
externalDocs:
  description: Find out more about CoCart API
  url: https://docs.cocartapi.com
servers:
- url: '{protocol}://{host}/wp-json/cocart/v2'
  description: API v2
  variables:
    protocol:
      enum:
      - http
      - https
      default: https
    host:
      default: example-store.com
      description: Your store domain
tags:
- name: mini-cart
  description: Operations for a lightweight mini cart response
- name: coupons
  description: Operations for managing coupons applied to the cart
- name: fees
  description: Operations for managing cart fees
- name: cart-items
  description: Operations for managing cart items
- name: shipping
  description: Operations for managing shipping on the cart
paths:
  /cart/mini:
    get:
      tags:
      - mini-cart
      summary: Get mini cart
      description: |
        Returns a lightweight version of the cart scoped to only the fields needed
        to render a mini cart: items, item count, currency and subtotal.
      parameters:
      - $ref: '#/components/parameters/CartKey'
      - $ref: '#/components/parameters/Fields'
      - $ref: '#/components/parameters/Thumb'
      - $ref: '#/components/parameters/DefaultCart'
      - $ref: '#/components/parameters/Formatted'
      responses:
        '200':
          description: Mini cart retrieved successfully.
          headers:
            Country:
              $ref: '#/components/headers/GeoCountry'
            Country-Code:
              $ref: '#/components/headers/GeoCountryCode'
            Region:
              $ref: '#/components/headers/GeoRegion'
            Timezone:
              $ref: '#/components/headers/GeoTimezone'
            RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MiniCart'
              example:
                cart_hash: e629fa6598d732768f7c726b4b621285
                cart_key: cb7a23af96a3f23af3c28a8b4b8c6d5e
                currency:
                  currency_code: USD
                  currency_symbol: $
                  currency_symbol_pos: left
                  currency_minor_unit: 2
                  currency_decimal_separator: .
                  currency_thousand_separator: ','
                  currency_prefix: $
                  currency_suffix: ''
                item_count: 2
                items:
                - item_key: 6364d3f0f495b6ab9dcf8d3b5c6e0b01
                  id: 123
                  name: Premium Quality T-Shirt
                  price: '1800'
                  quantity: 2
                  variation: []
                  cart_item_data: {}
                  featured_image: https://example-store.com/wp-content/uploads/2024/03/tshirt.jpg
                subtotal: '3600'
        '403':
          description: Forbidden - the minimum required version of CoCart is not installed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_minimum_version_required
                message: You do not have the minimum required version of CoCart installed to use this endpoint.
                data:
                  status: 403
  /cart/coupons:
    get:
      tags:
      - coupons
      summary: Get applied coupons
      description: |
        Returns the coupons applied to the cart with the discount totals for each coupon.
      parameters:
      - $ref: '#/components/parameters/CartKey'
      responses:
        '200':
          description: Applied coupons retrieved successfully.
          headers:
            Country:
              $ref: '#/components/headers/GeoCountry'
            Country-Code:
              $ref: '#/components/headers/GeoCountryCode'
            Region:
              $ref: '#/components/headers/GeoRegion'
            Timezone:
              $ref: '#/components/headers/GeoTimezone'
            RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppliedCouponDetailed'
              example:
              - coupon: summer10
                label: 'Coupon: summer10'
                discount_type: percent
                totals:
                  discount: '360'
                  discount_tax: '0'
        '404':
          description: Not found - coupons are not enabled or no coupons are applied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_enabled:
                  summary: Coupons not enabled
                  value:
                    code: cocart_coupons_not_enabled
                    message: Coupons are not enabled for this store!
                    data:
                      status: 404
                none_applied:
                  summary: No coupons applied
                  value:
                    code: cocart_cart_no_coupons_applied
                    message: No coupons are applied to the cart!
                    data:
                      status: 404
    delete:
      tags:
      - coupons
      summary: Remove all coupons
      description: |
        Removes all coupons applied to the cart and returns the updated cart.
      parameters:
      - $ref: '#/components/parameters/CartKey'
      - $ref: '#/components/parameters/Fields'
      - $ref: '#/components/parameters/Thumb'
      - $ref: '#/components/parameters/DefaultCart'
      - $ref: '#/components/parameters/Formatted'
      responses:
        '200':
          description: All coupons removed. Returns the updated cart.
          headers:
            Country:
              $ref: '#/components/headers/GeoCountry'
            Country-Code:
              $ref: '#/components/headers/GeoCountryCode'
            Region:
              $ref: '#/components/headers/GeoRegion'
            Timezone:
              $ref: '#/components/headers/GeoTimezone'
            RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartV2'
        '404':
          description: Not found - coupons are not enabled for this store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_coupons_not_enabled
                message: Coupons are not enabled for this store!
                data:
                  status: 404
  /cart/coupons/validate:
    get:
      tags:
      - coupons
      summary: Validate applied coupons
      description: |
        Checks all coupons applied to the cart to see if they are still valid.
        Invalid or expired coupons are removed from the cart. Coupons with email
        restrictions are checked against the customers billing email. The updated
        cart is returned with notices describing the validation results.
      parameters:
      - $ref: '#/components/parameters/CartKey'
      - $ref: '#/components/parameters/Fields'
      - $ref: '#/components/parameters/Thumb'
      - $ref: '#/components/parameters/DefaultCart'
      - $ref: '#/components/parameters/Formatted'
      - name: email
        in: query
        description: Customers billing email address used to check coupons restricted to certain email addresses.
        schema:
          type: string
          format: email
        required: false
      responses:
        '200':
          description: Coupons validated. Returns the updated cart with validation notices.
          headers:
            Country:
              $ref: '#/components/headers/GeoCountry'
            Country-Code:
              $ref: '#/components/headers/GeoCountryCode'
            Region:
              $ref: '#/components/headers/GeoRegion'
            Timezone:
              $ref: '#/components/headers/GeoTimezone'
            RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartV2'
        '404':
          description: Not found - coupons are not enabled for this store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_coupons_not_enabled
                message: Coupons are not enabled for this store!
                data:
                  status: 404
  /cart/apply-coupon:
    post:
      tags:
      - coupons
      summary: Apply coupon to cart
      description: |
        Applies a coupon code to the cart and returns the updated cart. If the coupon
        is already applied, the cart is returned with an informational notice.
        Coupons with email restrictions are checked against the customers billing
        email when provided.
      parameters:
      - $ref: '#/components/parameters/CartKey'
      - $ref: '#/components/parameters/Fields'
      - $ref: '#/components/parameters/Thumb'
      - $ref: '#/components/parameters/DefaultCart'
      - $ref: '#/components/parameters/Formatted'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  description: Coupon code to apply to the cart.
                  type: string
                email:
                  description: Customers email address used to check coupons restricted to certain email addresses.
                  type: string
                  format: email
              required:
              - code
            example:
              code: summer10
      responses:
        '200':
          description: Coupon applied. Returns the updated cart.
          headers:
            Country:
              $ref: '#/components/headers/GeoCountry'
            Country-Code:
              $ref: '#/components/headers/GeoCountryCode'
            Region:
              $ref: '#/components/headers/GeoRegion'
            Timezone:
              $ref: '#/components/headers/GeoTimezone'
            RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartV2'
        '404':
          description: Not found - coupons not enabled, no code provided, cart empty or coupon does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_exist:
                  summary: Coupon does not exist
                  value:
                    code: cocart_coupon_not_exist
                    message: Coupon "summer10" does not exist!
                    data:
                      status: 404
                cannot_add:
                  summary: Cart is empty
                  value:
                    code: cocart_coupon_cannot_add
                    message: Coupon cannot be applied to cart with no items.
                    data:
                      status: 404
  /cart/coupons/{code}:
    delete:
      tags:
      - coupons
      summary: Remove coupon by code
      description: |
        Removes a single coupon from the cart by its coupon code and returns the updated cart.
      parameters:
      - name: code
        in: path
        description: The coupon code to remove from the cart.
        required: true
        schema:
          type: string
          pattern: ^[\w-]+$
      - $ref: '#/components/parameters/CartKey'
      - $ref: '#/components/parameters/Fields'
      - $ref: '#/components/parameters/Thumb'
      - $ref: '#/components/parameters/DefaultCart'
      - $ref: '#/components/parameters/Formatted'
      responses:
        '200':
          description: Coupon removed. Returns the updated cart.
          headers:
            Country:
              $ref: '#/components/headers/GeoCountry'
            Country-Code:
              $ref: '#/components/headers/GeoCountryCode'
            Region:
              $ref: '#/components/headers/GeoRegion'
            Timezone:
              $ref: '#/components/headers/GeoTimezone'
            RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartV2'
        '404':
          description: Not found - coupons are not enabled or the coupon is not applied to the cart.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_coupons_not_enabled
                message: Coupons are not enabled for this store!
                data:
                  status: 404
  /cart/add-fee:
    post:
      tags:
      - fees
      summary: Add fee to cart
      description: |
        Adds a fee to the cart. The fee is stored in session and applied when cart
        totals are calculated. Returns the updated cart. If the same fee was already
        added, the cart is returned with an informational notice.
      parameters:
      - $ref: '#/components/parameters/CartKey'
      - $ref: '#/components/parameters/Fields'
      - $ref: '#/components/parameters/Thumb'
      - $ref: '#/components/parameters/DefaultCart'
      - $ref: '#/components/parameters/Formatted'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  description: Name of the fee.
                  type: string
                amount:
                  description: Amount for the fee as a decimal string (e.g. "10.00"). Use a negative amount for a discount.
                  type: string
                taxable:
                  description: Determines if the fee is taxable.
                  type: boolean
                  default: false
                tax_class:
                  description: The tax class the fee applies to.
                  type: string
              required:
              - name
              - amount
            example:
              name: Handling Fee
              amount: '10.00'
              taxable: true
      responses:
        '200':
          description: Fee added. Returns the updated cart.
          headers:
            Country:
              $ref: '#/components/headers/GeoCountry'
            Country-Code:
              $ref: '#/components/headers/GeoCountryCode'
            Region:
              $ref: '#/components/headers/GeoRegion'
            Timezone:
              $ref: '#/components/headers/GeoTimezone'
            RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartV2'
        '404':
          description: Not found - fee name or amount missing, or cart is empty.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_name:
                  summary: Fee name missing
                  value:
                    code: cocart_fee_missing_name
                    message: Name of fee is missing!
                    data:
                      status: 404
                cannot_add:
                  summary: Cart is empty
                  value:
                    code: cocart_fee_cannot_add
                    message: Fee cannot be applied to cart with no items.
                    data:
                      status: 404
  /cart/remove-fees:
    post:
      tags:
      - fees
      summary: Remove all fees
      description: |
        Removes all fees from the cart and returns the updated cart.
      parameters:
      - $ref: '#/components/parameters/CartKey'
      - $ref: '#/components/parameters/Fields'
      - $ref: '#/components/parameters/Thumb'
      - $ref: '#/components/parameters/DefaultCart'
      - $ref: '#/components/parameters/Formatted'
      responses:
        '200':
          description: All fees removed. Returns the updated cart.
          headers:
            Country:
              $ref: '#/components/headers/GeoCountry'
            Country-Code:
              $ref: '#/components/headers/GeoCountryCode'
            Region:
              $ref: '#/components/headers/GeoRegion'
            Timezone:
              $ref: '#/components/headers/GeoTimezone'
            RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartV2'
        '404':
          description: Not found - no fees have been added to the cart.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /cart/items:
    delete:
      tags:
      - cart-items
      summary: Remove all items
      description: |
        Removes all items from the cart and returns the updated (empty) cart.
      parameters:
      - $ref: '#/components/parameters/CartKey'
      - $ref: '#/components/parameters/Fields'
      - $ref: '#/components/parameters/Thumb'
      - $ref: '#/components/parameters/DefaultCart'
      - $ref: '#/components/parameters/Formatted'
      - $ref: '#/components/parameters/IfNoneMatch'
      - $ref: '#/components/parameters/SkipCache'
      responses:
        '200':
          description: All items removed. Returns the updated cart.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
            Country:
              $ref: '#/components/headers/GeoCountry'
            Country-Code:
              $ref: '#/components/headers/GeoCountryCode'
            Region:
              $ref: '#/components/headers/GeoRegion'
            Timezone:
              $ref: '#/components/headers/GeoTimezone'
            RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartV2'
        '304':
          description: Not Modified - cart unchanged since the ETag provided in If-None-Match.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
        '404':
          description: Not found - the cart has no items to remove.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /cart/set-shipping-method:
    post:
      tags:
      - shipping
      summary: Set shipping method
      description: |
        Sets the chosen shipping method for a shipping package (or all packages when
        no package ID is provided) and returns the updated cart with recalculated totals.
      parameters:
      - $ref: '#/components/parameters/CartKey'
      - $ref: '#/components/parameters/Fields'
      - $ref: '#/components/parameters/Thumb'
      - $ref: '#/components/parameters/DefaultCart'
      - $ref: '#/components/parameters/Formatted'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rate_id:
                  description: The chosen rate ID for the package (e.g. "flat_rate:1").
                  type: string
                package_id:
                  description: The ID of the package being shipped. Leave blank to apply to all packages.
                  oneOf:
                  - type: integer
                    nullable: true
                  - type: string
                    nullable: true
              required:
              - rate_id
            example:
              rate_id: flat_rate:1
              package_id: 0
      responses:
        '200':
          description: Shipping method set. Returns the updated cart.
          headers:
            Country:
              $ref: '#/components/headers/GeoCountry'
            Country-Code:
              $ref: '#/components/headers/GeoCountryCode'
            Region:
              $ref: '#/components/headers/GeoRegion'
            Timezone:
              $ref: '#/components/headers/GeoTimezone'
            RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartV2'
        '404':
          description: Not found - shipping not available or invalid rate ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  headers:
    ETagHeader:
      description: |
        Weak ETag cache validation token. Format: W/"<md5hash>". Use in If-None-Match on subsequent requests for conditional requests.
      schema:
        type: string
        pattern: ^W/"[a-f0-9]{32}"$
        example: W/"d41d8cd98f00b204e9800998ecf8427e"
    CoCartCacheHeader:
      description: |
        ETag cache status: HIT (304 returned), MISS (fresh response), SKIP (_skip_cache used).
      schema:
        type: string
        enum:
        - HIT
        - MISS
        - SKIP
        example: MISS
    GeoCountry:
      description: The geolocated country name of the customer. Only sent when the geolocation feature is enabled.
      schema:
        type: string
        example: United States
    GeoCountryCode:
      description: The geolocated two-letter country code of the customer. Only sent when the geolocation feature is enabled.
      schema:
        type: string
        example: US
    GeoRegion:
      description: The geolocated region of the customer. Only sent when the geolocation feature is enabled.
      schema:
        type: string
        example: California
    GeoTimezone:
      description: The geolocated timezone of the customer. Only sent when the geolocation feature is enabled.
      schema:
        type: string
        example: America/Los_Angeles
    RateLimitLimit:
      description: The maximum number of requests allowed in the current rate limit window. Only sent when rate limiting is enabled.
      schema:
        type: integer
        example: 25
    RateLimitRemaining:
      description: The number of requests remaining in the current rate limit window. Only sent when rate limiting is enabled.
      schema:
        type: integer
        example: 24
    RateLimitReset:
      description: Unix timestamp when the current rate limit window resets. Only sent when rate limiting is enabled.
      schema:
        type: integer
        example: 1767225600
  parameters:
    CartKey:
      name: cart_key
      in: query
      description: Unique identifier for the cart/customer.
      required: false
      schema:
        type: string
    Fields:
      name: fields
      in: query
      description: Specify each parent field you want to request separated by (,) in the response before the data is fetched.
      required: false
      schema:
        type: string
    Thumb:
      name: thumb
      in: query
      description: True if you want to return the URL of the featured product image for each item in the cart.
      required: false
      schema:
        type: boolean
        default: true
    DefaultCart:
      name: default
      in: query
      description: Return the default cart data if set to true.
      required: false
      schema:
        type: boolean
        default: false
    Formatted:
      name: formatted
      in: query
      description: Returns price values as a formatted string (e.g. "$18.00") when true. Defaults to false, returning raw numeric values (e.g. 1800).
      required: false
      schema:
        type: boolean
        default: false
    IfNoneMatch:
      name: If-None-Match
      in: header
      description: |
        Conditional request header. Send previous ETag value; server returns 304 Not Modified if resource unchanged.
      required: false
      schema:
        type: string
        example: W/"d41d8cd98f00b204e9800998ecf8427e"
    SkipCache:
      name: _skip_cache
      in: query
      description: |
        Set to true or 1 to bypass ETag checking. Forces full response with CoCart-Cache: SKIP header.
      required: false
      schema:
        type: string
        enum:
        - 'true'
        - '1'
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        Basic authentication with username and password.

        Since CoCart v4.9.0, if an `X-HTTP-Method-Override` header is present, it is honored
        when determining the request method during authentication (e.g. credentials sent in a
        JSON body are still detected when the original method is tunneled through POST).
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer token authentication (JWT). Optional for cart endpoints.
        When provided by customers, enables enhanced functionality like persistent carts and user-specific data.
  schemas:
    MiniCart:
      type: object
      description: Lightweight cart object scoped to the fields needed to render a mini cart.
      properties:
        cart_hash:
          type: string
          nullable: true
          description: A unique hash key of the cart contents.
        cart_key:
          type: string
          description: The cart key identifying the cart in session.
        currency:
          $ref: '#/components/schemas/Currency'
        item_count:
          type: integer
          description: The number of items in the cart.
        items:
          type: array
          description: The items in the cart.
          items:
            $ref: '#/components/schemas/MiniCartItem'
        subtotal:
          type: string
          description: The cart subtotal. Raw numeric string (e.g. "3600") by default; formatted string (e.g. "$36.00") when `formatted=true`.
    MiniCartItem:
      type: object
      properties:
        item_key:
          type: string
          description: Unique identifier for the item within the cart.
        id:
          type: integer
          description: Product ID.
        name:
          type: string
          description: Product name.
        price:
          type: string
          description: Product price. Raw numeric string (e.g. "1800") by default; formatted string (e.g. "$18.00") when `formatted=true`.
        quantity:
          type: number
          description: Quantity of the item in the cart.
        variation:
          description: Variation attributes for the item.
          oneOf:
          - type: object
            additionalProperties:
              type: string
          - type: array
            items:
              type: string
        cart_item_data:
          type: object
          description: Additional cart item data.
          additionalProperties: true
        featured_image:
          type: string
          format: uri
          description: Product featured image URL.
    AppliedCouponDetailed:
      type: object
      description: A coupon applied to the cart with its discount totals.
      properties:
        coupon:
          type: string
          description: Coupon code.
        label:
          type: string
          description: Human-readable coupon label.
        discount_type:
          type: string
          description: Type of discount applied (e.g. percent, fixed_cart, fixed_product).
        totals:
          type: object
          properties:
            discount:
              type: string
              description: Total discounted by this coupon as a raw numeric string (e.g. "360").
            discount_tax:
              type: string
              description: Total discounted tax by this coupon as a raw numeric string.
    CartV2:
      type: object
      description: Complete cart object with enhanced v2 structure. CoCart Plus adds the `meta` property.
      properties:
        cart_hash:
          type: string
          description: Unique cart hash.
        cart_key:
          type: string
          description: Unique cart key for the customer.
        currency:
          $ref: '#/components/schemas/Currency'
        customer:
          $ref: '#/components/schemas/Customer'
        items:
          type: object
          description: Cart items indexed by item key.
          additionalProperties:
            $ref: '#/components/schemas/CartItem'
        item_count:
          type: integer
          description: Total number of items in cart.
        items_weight:
          type: number
          description: Total weight of all items.
        coupons:
          type: array
          description: Applied coupons.
          items:
            $ref: '#/components/schemas/AppliedCoupon'
        needs_payment:
          type: boolean
          description: Whether the cart needs payment.
        needs_shipping:
          type: boolean
          description: Whether the cart needs shipping.
        shipping:
          $ref: '#/components/schemas/Shipping'
        fees:
          type: array
          description: Cart fees.
          items:
            $ref: '#/components/schemas/CartFee'
        taxes:
          type: array
          description: Cart taxes.
          items:
            $ref: '#/components/schemas/CartTax'
        totals:
          $ref: '#/components/schemas/CartTotals'
        removed_items:
          type: array
          description: Recently removed items that can be restored.
          items:
            $ref: '#/components/schemas/RemovedItem'
        cross_sells:
          type: array
          description: Cross-sell products.
          items:
            $ref: '#/components/schemas/CrossSellItem'
        notices:
          type: object
          description: Cart notices and messages.
          additionalProperties: true
        meta:
          type: object
          description: Cart meta data stored in session. Added by CoCart Plus.
          additionalProperties: true
        extensions:
          type: object
          description: Additional data added by third-party extensions via the `cocart_cart_extensions` filter. Only present when at least one extension hooks this filter.
          additionalProperties: true
    CartItem:
      type: object
      properties:
        item_key:
          type: string
          description: Unique identifier for the item within the cart.
        id:
          type: integer
          description: Product ID.
        name:
          type: string
          description: Product name.
        title:
          type: string
          description: Product title.
        price:
          type: string
          description: Current product price. Raw numeric value (e.g. "1800") by default; formatted string (e.g. "$18.00") when the `formatted` query parameter is true.
        quantity:
          type: object
          description: Quantity information for this item.
          properties:
            value:
              type: number
              description: Current quantity of the item in the cart.
            minimum:
              type: number
              description: The minimum purchase amount required.
            maximum:
              type: number
              description: The maximum purchase amount allowed. If -1 the item has an unlimited purchase amount.
            multiple_of:
              type: number
              description: The quantity must be a multiple of this value.
            editable:
              type: boolean
              description: Whether the quantity of the item is editable.
        totals:
          type: object
          description: Item totals. All values are raw numeric strings (e.g. "3600") by default; formatted strings (e.g. "$36.00") when `formatted=true`.
          properties:
            subtotal:
              type: string
              description: Line subtotal (before discounts).
            subtotal_tax:
              type: string
              description: Line subtotal tax.
            total:
              type: string
              description: Line total (after discounts).
            tax:
              type: string
              description: Line total tax.
        slug:
          type: string
          description: Product slug.
        meta:
          type: object
          description: Item metadata.
          properties:
            product_type:
              type: string
              description: Product type.
            sku:
              type: string
              description: Product SKU.
            dimensions:
              type: object
              description: Product dimensions.
              properties:
                length:
                  type: string
                  description: Product length.
                width:
                  type: string
                  description: Product width.
                height:
                  type: string
                  description: Product height.
                unit:
                  type: string
                  description: Dimension unit.
            weight:
              type: string
              description: Product weight.
            variation:
              description: Chosen attributes (for variations).
              oneOf:
              - type: object
                additionalProperties:
                  type: string
              - type: array
                items:
                  type: string
          additionalProperties: true
        backorders:
          type: string
          description: Backorder status.
        cart_item_data:
          type: object
          description: Custom cart item data.
          additionalProperties: true
        featured_image:
          type: string
          description: Product featured image URL.
        extensions:
          type: object
          description: Additional data added by third-party extensions via the `cocart_cart_item_extensions` filter. Empty object when no extensions hook this filter.
          additionalProperties: true
    Currency:
      type: object
      properties:
        currency_code:
          type: string
          description: Currency code.
        currency_symbol:
          type: string
          description: Currency symbol.
        currency_symbol_pos:
          type: string
          description: Currency symbol position.
        currency_minor_unit:
          type: integer
          description: Currency minor unit.
        currency_decimal_separator:
          type: string
          description: Currency decimal separator.
        currency_thousand_separator:
          type: string
          description: Currency thousand separator.
        currency_prefix:
          type: string
          description: Currency prefix.
        currency_suffix:
          type: string
          description: Currency suffix.
    Customer:
      type: object
      properties:
        billing_address:
          $ref: '#/components/schemas/BillingAddress'
        shipping_address:
          $ref: '#/components/schemas/ShippingAddress'
    BillingAddress:
      type: object
      properties:
        billing_first_name:
          type: string
        billing_last_name:
          type: string
        billing_company:
          type: string
        billing_country:
          type: string
        billing_address_1:
          type: string
        billing_address_2:
          type: string
        billing_postcode:
          type: string
        billing_city:
          type: string
        billing_state:
          type: string
        billing_phone:
          type: string
        billing_email:
          type: string
    ShippingAddress:
      type: object
      properties:
        shipping_first_name:
          type: string
        shipping_last_name:
          type: string
        shipping_company:
          type: string
        shipping_country:
          type: string
        shipping_address_1:
          type: string
        shipping_address_2:
          type: string
        shipping_postcode:
          type: string
        shipping_city:
          type: string
        shipping_state:
          type: string
    Shipping:
      type: object
      properties:
        total_packages:
          type: integer
          description: Number of shipping packages.
        show_package_details:
          type: boolean
          description: Whether to show package details.
        has_calculated_shipping:
          type: boolean
          description: Whether shipping has been calculated.
        packages:
          type: object
          description: Shipping packages.
          additionalProperties:
            $ref: '#/components/schemas/ShippingPackage'
    ShippingPackage:
      type: object
      properties:
        package_name:
          type: string
          description: Package name.
        rates:
          type: object
          description: Available shipping rates.
          additionalProperties:
            $ref: '#/components/schemas/ShippingRate'
        package_details:
          type: string
          description: Package details.
        index:
          type: integer
          description: Package index.
        chosen_method:
          type: string
          description: Chosen shipping method.
        formatted_destination:
          type: string
          description: Formatted destination address.
    ShippingRate:
      type: object
      properties:
        key:
          type: string
        method_id:
          type: string
        instance_id:
          type: integer
        label:
          type: string
        cost:
          type: string
        html:
          type: string
        taxes:
          type: string
        chosen_method:
          type: boolean
    CartTotals:
      type: object
      description: All monetary values are raw numeric strings (e.g. "1800") by default. Pass `formatted=true` to receive formatted strings (e.g. "$18.00").
      properties:
        subtotal:
          type: string
          description: Cart subtotal.
        subtotal_tax:
          type: string
          description: Cart subtotal tax.
        shipping_total:
          type: string
          description: Shipping total.
        shipping_tax:
          type: string
          description: Shipping tax.
        shipping_taxes:
          type: array
          items:
            type: number
        discount_total:
          type: string
          description: Discount total.
        discount_tax:
          type: string
          description: Discount tax.
        cart_contents_total:
          type: string
          description: Cart contents total.
        cart_contents_tax:
          type: string
          description: Cart contents tax.
        cart_contents_taxes:
          type: array
          items:
            type: number
        fee_total:
          type: string
          description: Fee total.
        fee_tax:
          type: string
          description: Fee tax.
        fee_taxes:
          type: array
          items:
            type: number
        total:
          type: string
          description: Cart total.
        total_tax:
          type: string
          description: Total tax.
    CartFee:
      type: object
      properties:
        name:
          type: string
        amount:
          type: number
        taxable:
          type: boolean
        tax_class:
          type: string
        total:
          type: number
        tax:
          type: number
    CartTax:
      type: object
      description: |
        Tax entry. Structure depends on the WooCommerce tax display setting:
        - Non-itemized: `{ label, total }` — a single combined tax line.
        - Itemized: `{ name, price }` — one entry per tax rate.
      properties:
        label:
          type: string
          description: Tax label (non-itemized mode).
        total:
          type: string
          description: Combined tax total as raw numeric string, e.g. "1310" (non-itemized mode). Formatted string when `formatted=true`.
        name:
          type: string
          description: Tax rate name (itemized mode).
        price:
          type: string
          description: Tax amount as raw numeric string (itemized mode). Formatted string when `formatted=true`.
    AppliedCoupon:
      type: object
      properties:
        coupon:
          type: string
          description: Coupon code.
        label:
          type: string
          description: Human-readable coupon label.
        discount_type:
          type: string
          description: Type of discount applied (e.g. percent, fixed_cart, fixed_product).
        saving:
          type: string
          description: Amount saved by this coupon, formatted without HTML.
        saving_html:
          type: string
          description: Amount saved by this coupon, formatted as HTML.
    RemovedItem:
      type: object
      properties:
        key:
          type: string
        product_id:
          type: integer
        quantity:
          type: integer
        name:
          type: string
    CrossSellItem:
      type: object
      properties:
        id:
          type: integer
        product_name:
          type: string
        product_title:
          type: string
        price:
          type: string
          description: Current price. Raw numeric string (e.g. "1800") by default; formatted string (e.g. "$18.00") when `formatted=true`.
        regular_price:
          type: string
          description: Regular price. Raw numeric string by default; formatted when `formatted=true`.
        sale_price:
          type: string
          description: Sale price if on sale, otherwise empty string. Raw numeric string by default; formatted when `formatted=true`.
        product_image:
          type: string
    ErrorResponse:
      type: object
      description: Standard error response structure.
      properties:
        code:
          type: string
          description: Machine-readable error code.
          example: cocart_invalid_parameter
        message:
          type: string
          description: Human-readable error message.
          example: Invalid parameter provided.
        data:
          type: object
          description: Additional error data.
          properties:
            status:
              type: integer
              description: HTTP status code.
              example: 400
          additionalProperties: true
security:
- {}
- basicAuth: []
- bearerAuth: []
