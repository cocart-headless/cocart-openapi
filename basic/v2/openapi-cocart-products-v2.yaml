openapi: 3.0.3
info:
  title: CoCart - Products API v2
  version: 5.0.0
  description: |
    CoCart REST API for browsing and retrieving product information.
  termsOfService: https://cocartapi.com/terms-of-conditions-polar/
  contact:
    email: support@cocartapi.com
  license:
    name: GNU General Public License v3.0
    url: http://www.gnu.org/licenses/gpl-3.0.html
externalDocs:
  description: Find out more about CoCart API
  url: https://docs.cocartapi.com
servers:
- url: '{protocol}://{host}/wp-json/cocart/v2'
  description: API v2
  variables:
    protocol:
      enum:
      - http
      - https
      default: https
    host:
      default: example-store.com
      description: Your store domain
tags:
- name: products
  description: Operations for browsing and retrieving product information
- name: product-attributes
  description: Operations for retrieving product attributes and attribute terms
- name: product-categories
  description: Operations for browsing and filtering product categories
- name: product-tags
  description: Operations for browsing and filtering product tags
- name: product-brands
  description: Operations for browsing and filtering product brands
- name: product-reviews
  description: Operations for retrieving product reviews and ratings
- name: product-variations
  description: Operations for retrieving variable product variations
paths:
  /products:
    get:
      tags:
      - products
      summary: Get products
      description: |
        Gets a list of products with optional filtering and pagination.
      parameters:
      - name: page
        in: query
        description: Current page of the collection.
        schema:
          type: integer
          default: 1
      - name: per_page
        in: query
        description: Maximum number of items to return per page.
        schema:
          type: integer
          default: 10
          maximum: 100
      - name: context
        in: query
        description: Scope under which the request is made.
        schema:
          type: string
          enum:
          - view
          - embed
          default: view
      - name: search
        in: query
        description: Limit results to those matching a search string.
        schema:
          type: string
      - name: category
        in: query
        description: Limit results to products in specific categories.
        schema:
          type: string
      - name: tag
        in: query
        description: Limit results to products with specific tags.
        schema:
          type: string
      - name: type
        in: query
        description: Limit results to products of specific type.
        schema:
          type: string
          enum:
          - simple
          - grouped
          - external
          - variable
          - variation
      - name: exclude_types
        in: query
        description: Exclude products of specific types.
        schema:
          type: array
          items:
            type: string
      - name: include_types
        in: query
        description: Include only products of specific types.
        schema:
          type: array
          items:
            type: string
      - name: global_unique_id
        in: query
        description: Filter by global unique identifier (GTIN, UPC, EAN, ISBN).
        schema:
          type: string
      - name: virtual
        in: query
        description: Limit result set to virtual products only.
        schema:
          type: boolean
      - name: featured
        in: query
        description: Limit results to featured products.
        schema:
          type: boolean
      - name: on_sale
        in: query
        description: Limit results to products on sale.
        schema:
          type: boolean
      - name: min_price
        in: query
        description: Limit results to products with price greater than or equal to this value.
        schema:
          type: string
      - name: max_price
        in: query
        description: Limit results to products with price less than or equal to this value.
        schema:
          type: string
      - name: stock_status
        in: query
        description: Limit results to products with specified stock status.
        schema:
          type: string
          enum:
          - instock
          - outofstock
          - onbackorder
      - name: orderby
        in: query
        description: Sort products by field.
        schema:
          type: string
          enum:
          - date
          - id
          - include
          - title
          - slug
          - price
          - popularity
          - rating
          - menu_order
          - alphabetical
          - reverse_alpha
          - relevance
          - rand
          - by_stock
          - review_count
          - on_sale_first
          - featured_first
          - price_asc
          - price_desc
          - sales
          default: date
      - name: order
        in: query
        description: Sort order.
        schema:
          type: string
          enum:
          - ASC
          - DESC
          default: DESC
      - name: slug
        in: query
        description: Limit result set to products with a specific slug.
        schema:
          type: string
      - name: after
        in: query
        description: Limit response to products created after a given ISO8601 compliant date.
        schema:
          type: string
          format: date-time
      - name: before
        in: query
        description: Limit response to products created before a given ISO8601 compliant date.
        schema:
          type: string
          format: date-time
      - name: sku
        in: query
        description: Limit result set to products with specific SKU(s). Use commas to separate.
        schema:
          type: string
      - name: hide_free
        in: query
        description: Limit result set to hide free products.
        schema:
          type: boolean
          default: false
      - name: category_operator
        in: query
        description: Operator to compare product category terms.
        schema:
          type: string
          enum:
          - in
          - not_in
          - and
          default: in
      - name: tag_operator
        in: query
        description: Operator to compare product tags.
        schema:
          type: string
          enum:
          - in
          - not_in
          - and
          default: in
      - name: brand
        in: query
        description: Limit result set to products assigned a set of brand IDs or slugs, separated by commas.
        schema:
          type: string
      - name: brand_operator
        in: query
        description: Operator to compare product brand terms.
        schema:
          type: string
          enum:
          - in
          - not_in
          - and
          default: in
      - name: show_reviews
        in: query
        description: Returns product reviews for all products or an individual product.
        schema:
          type: boolean
          default: false
      - name: return_variations
        in: query
        description: Returns all variations for variable products.
        schema:
          type: boolean
          default: false
      - name: attributes
        in: query
        description: Filter by global product attributes. Array of objects with `attribute`, `term_id`, `slug`, and `operator` fields.
        schema:
          type: array
          items:
            type: object
            properties:
              attribute:
                type: string
                description: Attribute taxonomy name.
              term_id:
                type: integer
                description: Attribute term ID.
              slug:
                type: string
                description: Attribute term slug.
              operator:
                type: string
                description: Comparison operator.
                enum:
                - in
                - not_in
                - and
      - name: attribute_relation
        in: query
        description: The logical relationship between attributes when filtering across multiple at once.
        schema:
          type: string
          enum:
          - in
          - and
          default: and
      - name: catalog_visibility
        in: query
        description: Determines if hidden or visible catalog products are shown.
        schema:
          type: string
          enum:
          - any
          - visible
          - catalog
          - search
          - hidden
          default: visible
      - name: rating
        in: query
        description: Limit result set to products with a certain average rating.
        schema:
          type: array
          items:
            type: integer
            enum:
            - 1
            - 2
            - 3
            - 4
            - 5
      - name: offset
        in: query
        description: Offset the result set by a specific number of items.
        schema:
          type: integer
      - name: include
        in: query
        description: Limit result set to specific IDs.
        schema:
          type: array
          items:
            type: integer
      - name: exclude
        in: query
        description: Ensure result set excludes specific IDs.
        schema:
          type: array
          items:
            type: integer
      - name: parent
        in: query
        description: Limit result set to those of particular parent IDs.
        schema:
          type: array
          items:
            type: integer
      - name: parent_exclude
        in: query
        description: Limit result set to exclude particular parent IDs.
        schema:
          type: array
          items:
            type: integer
      - $ref: '#/components/parameters/IfNoneMatch'
      - $ref: '#/components/parameters/SkipCache'
      responses:
        '200':
          description: Products retrieved successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsResponse'
