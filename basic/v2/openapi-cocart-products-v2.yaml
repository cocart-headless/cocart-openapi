components:
  headers:
    ETagHeader:
      description: |
        Weak ETag cache validation token. Format: W/"<md5hash>". Use in If-None-Match on subsequent requests for conditional GET.
      schema:
        type: string
        pattern: ^W/"[a-f0-9]{32}"$
        example: W/"d41d8cd98f00b204e9800998ecf8427e"
    CoCartCacheHeader:
      description: |
        ETag cache status: HIT (304 returned), MISS (fresh response), SKIP (_skip_cache used).
      schema:
        type: string
        enum:
        - HIT
        - MISS
        - SKIP
        example: MISS
  parameters:
    IfNoneMatch:
      name: If-None-Match
      in: header
      description: |
        Conditional request header. Send previous ETag value; server returns 304 Not Modified if resource unchanged.
      required: false
      schema:
        type: string
        example: W/"d41d8cd98f00b204e9800998ecf8427e"
    SkipCache:
      name: _skip_cache
      in: query
      description: |
        Set to true or 1 to bypass ETag checking. Forces full response with CoCart-Cache: SKIP header.
      required: false
      schema:
        type: string
        enum:
        - 'true'
        - '1'
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        Basic authentication with username and password.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer token authentication (JWT). Optional for cart and products endpoints.
        When provided by customers, enables enhanced functionality like persistent carts and user-specific data.
        Required only for admin operations like managing cart sessions.
  schemas:
    Currency:
      type: object
      properties:
        currency_code:
          type: string
          description: Currency code.
        currency_symbol:
          type: string
          description: Currency symbol.
        currency_symbol_pos:
          type: string
          description: Currency symbol position.
        currency_minor_unit:
          type: integer
          description: Currency minor unit.
        currency_decimal_separator:
          type: string
          description: Currency decimal separator.
        currency_thousand_separator:
          type: string
          description: Currency thousand separator.
        currency_prefix:
          type: string
          description: Currency prefix.
        currency_suffix:
          type: string
          description: Currency suffix.
    ProductsResponse:
      type: object
      description: Products collection response with pagination
      properties:
        products:
          type: array
          description: Array of products
          items:
            $ref: '#/components/schemas/Product'
        page:
          type: integer
          description: Current page number
        total_pages:
          type: integer
          description: Total number of pages
        total_products:
          type: integer
          description: Total number of products
    Product:
      type: object
      description: Product object with custom structure
      properties:
        id:
          type: integer
          description: Unique identifier for the product
        parent_id:
          type: integer
          description: Product parent ID
        name:
          type: string
          description: Product name
        type:
          type: string
          description: Product type
          enum:
          - simple
          - grouped
          - external
          - variable
        slug:
          type: string
          description: Product slug
        permalink:
          type: string
          description: Product URL
        sku:
          type: string
          description: Unique identifier (SKU)
        description:
          type: string
          description: Product description
        short_description:
          type: string
          description: Product short description
        dates:
          type: object
          description: Product dates
          properties:
            created:
              type: string
              format: date-time
              description: Date created in local time
            created_gmt:
              type: string
              format: date-time
              description: Date created in GMT
            modified:
              type: string
              format: date-time
              description: Date modified in local time
            modified_gmt:
              type: string
              format: date-time
              description: Date modified in GMT
        featured:
          type: boolean
          description: Whether the product is featured
        prices:
          type: object
          description: Product pricing information
          properties:
            price:
              type: string
              description: Current product price
            regular_price:
              type: string
              description: Product regular price
            sale_price:
              type: string
              description: Product sale price (empty string if not on sale)
            price_range:
              type: object
              description: Price range for variable products (null for non-variable products)
              nullable: true
            on_sale:
              type: boolean
              description: Whether the product is on sale
            date_on_sale:
              type: object
              description: Sale date information
              properties:
                from:
                  type: string
                  format: date-time
                  nullable: true
                  description: Sale start date in local time
                from_gmt:
                  type: string
                  format: date-time
                  nullable: true
                  description: Sale start date in GMT
                to:
                  type: string
                  format: date-time
                  nullable: true
                  description: Sale end date in local time
                to_gmt:
                  type: string
                  format: date-time
                  nullable: true
                  description: Sale end date in GMT
            currency:
              $ref: '#/components/schemas/Currency'
        hidden_conditions:
          type: object
          description: Product conditional flags
          properties:
            virtual:
              type: boolean
              description: Whether the product is virtual
            downloadable:
              type: boolean
              description: Whether the product is downloadable
            manage_stock:
              type: boolean
              description: Whether stock is managed at product level
            sold_individually:
              type: boolean
              description: Whether only one item can be bought in a single order
            reviews_allowed:
              type: boolean
              description: Whether reviews are allowed
            shipping_required:
              type: boolean
              description: Whether the product needs to be shipped
        average_rating:
          type: string
          description: Average rating
        review_count:
          type: integer
          description: Number of reviews
        rating_count:
          type: integer
          description: Number of ratings
        rated_out_of:
          type: string
          description: Maximum rating value (formatted)
        images:
          type: array
          description: Product images
          items:
            $ref: '#/components/schemas/ProductImage'
        categories:
          type: array
          description: Product categories
          items:
            $ref: '#/components/schemas/ProductCategory'
        tags:
          type: array
          description: Product tags
          items:
            $ref: '#/components/schemas/ProductTag'
        attributes:
          type: array
          description: Product attributes
          items:
            $ref: '#/components/schemas/ProductAttribute'
        default_attributes:
          type: array
          description: Default variation attributes
          items:
            $ref: '#/components/schemas/ProductDefaultAttribute'
        variations:
          type: array
          description: Full variation objects (not just IDs)
          items:
            $ref: '#/components/schemas/ProductVariation'
        grouped_products:
          type: array
          description: Grouped product IDs
          items:
            type: integer
        stock:
          type: object
          description: Stock information
          properties:
            is_in_stock:
              type: boolean
              description: Whether the product is in stock
            stock_quantity:
              type: integer
              nullable: true
              description: Stock quantity (null if not managing stock)
            stock_status:
              type: string
              description: Stock status
              enum:
              - instock
              - outofstock
              - onbackorder
            backorders:
              type: string
              description: If managing stock, this controls if backorders are allowed
              enum:
              - false
              - notify
              - true
            backorders_allowed:
              type: boolean
              description: Whether backorders are allowed
            backordered:
              type: boolean
              description: Whether the product is on backorder
            low_stock_amount:
              type: integer
              nullable: true
              description: Low stock threshold amount
        weight:
          type: object
          description: Product weight
          properties:
            value:
              type: string
              nullable: true
              description: Weight value
            unit:
              type: string
              description: Weight unit (kg, g, lbs, oz, etc.)
        dimensions:
          type: object
          description: Product dimensions
          properties:
            length:
              type: string
              nullable: true
              description: Length value
            width:
              type: string
              nullable: true
              description: Width value
            height:
              type: string
              nullable: true
              description: Height value
            unit:
              type: string
              description: Dimension unit (cm, m, in, etc.)
        reviews:
          type: array
          description: Product reviews (populated when show_reviews parameter is true)
          items:
            $ref: '#/components/schemas/ProductReview'
        related:
          type: array
          description: Related products with basic information
          items:
            $ref: '#/components/schemas/ConnectedProduct'
        upsells:
          type: array
          description: Upsell products with basic information
          items:
            $ref: '#/components/schemas/ConnectedProduct'
        cross_sells:
          type: array
          description: Cross-sell products with basic information
          items:
            $ref: '#/components/schemas/ConnectedProduct'
        total_sales:
          type: integer
          description: Total number of sales
        external_url:
          type: string
          description: External product URL (for external product type)
        button_text:
          type: string
          description: External product button text (for external product type)
        add_to_cart:
          type: object
          description: Add to cart information (CoCart-specific)
          properties:
            text:
              type: string
              description: Add to cart button text
            description:
              type: string
              description: Add to cart description
            has_options:
              type: boolean
              description: Whether the product has options
            is_purchasable:
              type: boolean
              description: Whether the product is purchasable
            purchase_quantity:
              type: object
              description: Purchase quantity limits
              properties:
                minimum:
                  type: integer
                  description: The minimum purchase amount required.
                maximum:
                  type: integer
                  description: The maximum purchase amount allowed.
                multiple_of:
                  type: integer
                  description: The quantity must be a multiple of this value.
            rest_url:
              type: string
              description: REST URL for adding this product to cart
        meta_data:
          type: array
          description: Meta data
          items:
            type: object
            properties:
              key:
                type: string
              value:
                type: string
    ProductCategory:
      type: object
      description: Product Category
      properties:
        id:
          type: integer
          description: Category ID
        name:
          type: string
          description: Category name
        slug:
          type: string
          description: Category slug
        rest_url:
          type: string
          description: REST URL for this category
    ProductTag:
      type: object
      description: Product Tag
      properties:
        id:
          type: integer
          description: Tag ID
        name:
          type: string
          description: Tag name
        slug:
          type: string
          description: Tag slug
        rest_url:
          type: string
          description: REST URL for this tag
    ProductBrand:
      type: object
      description: Product Brand
      properties:
        id:
          type: integer
          description: Brand ID
        name:
          type: string
          description: Brand name
        slug:
          type: string
          description: Brand slug
        description:
          type: string
          description: Brand description
        count:
          type: integer
          description: Number of products in this brand
        rest_url:
          type: string
          description: REST URL for this brand
    ProductImage:
      type: object
      description: Product Image with multiple size URLs
      properties:
        id:
          type: integer
          description: Image ID
        src:
          type: object
          description: Image URLs in different sizes
          additionalProperties:
            type: string
            description: URL for specific image size (thumbnail, medium, large, full, etc.)
        name:
          type: string
          description: Image name
        alt:
          type: string
          description: Image alternative text
        position:
          type: integer
          description: Image position in gallery
        featured:
          type: boolean
          description: Whether this is the featured image
    ProductAttribute:
      type: object
      properties:
        id:
          type: integer
          description: Attribute ID.
        name:
          type: string
          description: Attribute name.
        position:
          type: integer
          description: Attribute position.
        visible:
          type: boolean
          description: Define if the attribute is visible on the "Additional information" tab in the product's page.
        variation:
          type: boolean
          description: Define if the attribute can be used as variation.
        options:
          type: array
          description: List of available term names of the attribute.
          items:
            type: string
    ProductDefaultAttribute:
      type: object
      properties:
        id:
          type: integer
          description: Attribute ID.
        name:
          type: string
          description: Attribute name.
        option:
          type: string
          description: Selected attribute term name.
    ProductAttributeTerm:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the resource.
        name:
          type: string
          description: Term name.
        slug:
          type: string
          description: An alphanumeric identifier for the resource unique to its type.
        description:
          type: string
          description: HTML description of the resource.
        menu_order:
          type: integer
          description: Menu order, used to custom sort the resource.
        count:
          type: integer
          description: Number of published products for the resource.
    ProductReview:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the resource.
        date_created:
          type: string
          format: date-time
          description: The date the review was created.
        date_created_gmt:
          type: string
          format: date-time
          description: The date the review was created, as GMT.
        product_id:
          type: integer
          description: Unique identifier for the product that the review belongs to.
        status:
          type: string
          description: Status of the review.
        reviewer:
          type: string
          description: Name of the reviewer.
        reviewer_email:
          type: string
          description: Email of the reviewer.
        review:
          type: string
          description: The content of the review.
        rating:
          type: integer
          description: Review rating (0 to 5).
        verified:
          type: boolean
          description: Shows if the reviewer bought the product or not.
    ProductVariation:
      type: object
      description: |
        Product Variation object. Variations use the same structure as Product objects,
        but with the following fields removed: type, short_description, hidden_conditions.reviews_allowed,
        average_rating, review_count, rating_count, rated_out_of, reviews, default_attributes,
        variations, grouped_products, related, upsells, cross_sells, external_url, button_text,
        and add_to_cart.has_options.
      properties:
        id:
          type: integer
          description: Unique identifier for the variation
        parent_id:
          type: integer
          description: Product parent ID (the variable product this variation belongs to)
        name:
          type: string
          description: Variation name
        slug:
          type: string
          description: Variation slug
        permalink:
          type: string
          description: Variation URL
        sku:
          type: string
          description: Unique identifier (SKU)
        description:
          type: string
          description: Variation description
        dates:
          type: object
          description: Variation dates
          properties:
            created:
              type: string
              format: date-time
              description: Date created in local time
            created_gmt:
              type: string
              format: date-time
              description: Date created in GMT
            modified:
              type: string
              format: date-time
              description: Date modified in local time
            modified_gmt:
              type: string
              format: date-time
              description: Date modified in GMT
        featured:
          type: boolean
          description: Whether the variation is featured
        prices:
          type: object
          description: Variation pricing information
          properties:
            price:
              type: string
              description: Current variation price
            regular_price:
              type: string
              description: Variation regular price
            sale_price:
              type: string
              description: Variation sale price (empty string if not on sale)
            price_range:
              type: object
              description: Price range (null for variations)
              nullable: true
            on_sale:
              type: boolean
              description: Whether the variation is on sale
            date_on_sale:
              type: object
              description: Sale date information
              properties:
                from:
                  type: string
                  format: date-time
                  nullable: true
                  description: Sale start date in local time
                from_gmt:
                  type: string
                  format: date-time
                  nullable: true
                  description: Sale start date in GMT
                to:
                  type: string
                  format: date-time
                  nullable: true
                  description: Sale end date in local time
                to_gmt:
                  type: string
                  format: date-time
                  nullable: true
                  description: Sale end date in GMT
            currency:
              $ref: '#/components/schemas/Currency'
        hidden_conditions:
          type: object
          description: Variation conditional flags (note reviews_allowed is not present)
          properties:
            virtual:
              type: boolean
              description: Whether the variation is virtual
            downloadable:
              type: boolean
              description: Whether the variation is downloadable
            manage_stock:
              type: boolean
              description: Whether stock is managed at variation level
            sold_individually:
              type: boolean
              description: Whether only one item can be bought in a single order
            shipping_required:
              type: boolean
              description: Whether the variation needs to be shipped
        images:
          type: array
          description: Variation images
          items:
            $ref: '#/components/schemas/ProductImage'
        categories:
          type: array
          description: Product categories (inherited from parent)
          items:
            $ref: '#/components/schemas/ProductCategory'
        tags:
          type: array
          description: Product tags (inherited from parent)
          items:
            $ref: '#/components/schemas/ProductTag'
        attributes:
          type: array
          description: Variation attributes
          items:
            $ref: '#/components/schemas/ProductAttribute'
        stock:
          type: object
          description: Stock information
          properties:
            is_in_stock:
              type: boolean
              description: Whether the variation is in stock
            stock_quantity:
              type: integer
              nullable: true
              description: Stock quantity (null if not managing stock)
            stock_status:
              type: string
              description: Stock status
              enum:
              - instock
              - outofstock
              - onbackorder
            backorders:
              type: string
              description: If managing stock, this controls if backorders are allowed
              enum:
              - false
              - notify
              - true
            backorders_allowed:
              type: boolean
              description: Whether backorders are allowed
            backordered:
              type: boolean
              description: Whether the variation is on backorder
            low_stock_amount:
              type: integer
              nullable: true
              description: Low stock threshold amount
        weight:
          type: object
          description: Variation weight
          properties:
            value:
              type: string
              nullable: true
              description: Weight value
            unit:
              type: string
              description: Weight unit (kg, g, lbs, oz, etc.)
        dimensions:
          type: object
          description: Variation dimensions
          properties:
            length:
              type: string
              nullable: true
              description: Length value
            width:
              type: string
              nullable: true
              description: Width value
            height:
              type: string
              nullable: true
              description: Height value
            unit:
              type: string
              description: Dimension unit (cm, m, in, etc.)
        total_sales:
          type: integer
          description: Total number of sales for this variation
        add_to_cart:
          type: object
          description: Add to cart information (note has_options is not present)
          properties:
            text:
              type: string
              description: Add to cart button text
            description:
              type: string
              description: Add to cart description
            is_purchasable:
              type: boolean
              description: Whether the variation is purchasable
            purchase_quantity:
              type: object
              description: Purchase quantity limits
              properties:
                minimum:
                  type: integer
                  description: The minimum purchase amount required.
                maximum:
                  type: integer
                  description: The maximum purchase amount allowed.
                multiple_of:
                  type: integer
                  description: The quantity must be a multiple of this value.
            rest_url:
              type: string
              description: REST URL for adding this variation to cart
        meta_data:
          type: array
          description: Meta data
          items:
            type: object
            properties:
              key:
                type: string
              value:
                type: string
    ConnectedProduct:
      type: object
      description: Connected Product (used for related, upsells, cross-sells)
      properties:
        id:
          type: integer
          description: Product ID
        name:
          type: string
          description: Product name
        permalink:
          type: string
          description: Product URL
        price:
          type: string
          description: Product price
        add_to_cart:
          type: object
          description: Add to cart information
          properties:
            text:
              type: string
              description: Add to cart button text
            description:
              type: string
              description: Add to cart description
            rest_url:
              type: string
              description: REST URL for adding this product to cart
        rest_url:
          type: string
          description: REST URL for this product
    ErrorResponse:
      type: object
      description: Standard error response structure.
      properties:
        code:
          type: string
          description: Machine-readable error code.
          example: cocart_invalid_parameter
        message:
          type: string
          description: Human-readable error message.
          example: Invalid parameter provided.
        data:
          type: object
          description: Additional error data.
          properties:
            status:
              type: integer
              description: HTTP status code.
              example: 400
            params:
              type: object
              description: Parameter-specific error details.
              additionalProperties: true
          additionalProperties: true
