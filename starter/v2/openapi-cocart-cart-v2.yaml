      - $ref: '#/components/parameters/IfNoneMatch'
      - $ref: '#/components/parameters/SkipCache'
      responses:
        '200':
          description: Cart item count retrieved successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                type: integer
                description: Number of items in the cart.
                example: 5
        '304':
          description: Not Modified - resource has not changed since last request.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
        '400':
          description: Bad request - invalid parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_invalid_parameter
                message: Invalid return format parameter.
                data:
                  status: 400
  /cart/clear:
    post:
      tags:
      - cart
      summary: Clear cart
      description: |
        Removes all items from the customer's cart.
      parameters:
      - name: formatted
        in: query
        description: Returns price values as a formatted string (e.g. "$18.00") when true. Defaults to false, returning raw numeric values (e.g. 1800).
        schema:
