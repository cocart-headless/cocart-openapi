openapi: 3.0.3
info:
  title: CoCart - Cart API v2
  version: 5.0.0
  description: |
    CoCart REST API for managing shopping carts.
  termsOfService: https://cocartapi.com/terms-of-conditions-polar/
  contact:
    email: support@cocartapi.com
  license:
    name: GNU General Public License v3.0
    url: http://www.gnu.org/licenses/gpl-3.0.html
externalDocs:
  description: Find out more about CoCart API
  url: https://docs.cocartapi.com
servers:
- url: '{protocol}://{host}/wp-json/cocart/v2'
  description: API v2
  variables:
    protocol:
      enum:
      - http
      - https
      default: https
    host:
      default: example-store.com
      description: Your store domain
tags:
- name: cart
  description: Operations for managing the shopping cart
- name: cart-items
  description: Operations for managing cart items
- name: cart-calculate
  description: Operations for calculating cart totals
paths:
  /cart:
    get:
      tags:
      - cart
      summary: Get cart contents
      description: |
        Gets the cart contents including items, totals, and customer information.
      parameters:
      - name: cart_key
        in: query
        description: Unique identifier for the cart/customer.
        schema:
          type: string
        required: false
      - name: fields
        in: query
        description: Specify each parent field you want to request separated by (,) in the response before the data is fetched.
        schema:
          type: string
        required: false
      - name: default
        in: query
        description: Return the default cart data if set to true.
        schema:
          type: boolean
          default: false
        required: false
      - name: thumb
        in: query
        description: True if you want to return the URL of the featured product image for each item in the cart.
        schema:
          type: boolean
          default: true
        required: false
      - name: formatted
        in: query
        description: Returns price values as a formatted string (e.g. "$18.00") when true. Defaults to false, returning raw numeric values (e.g. 1800).
        schema:
          type: boolean
          default: false
        required: false
      - $ref: '#/components/parameters/IfNoneMatch'
      - $ref: '#/components/parameters/SkipCache'
      responses:
        '200':
          description: Cart retrieved successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartV2'
              example:
                cart_hash: e629fa6598d732768f7c726b4b621285
                cart_key: cb7a23af96a3f23af3c28a8b4b8c6d5e
                currency:
                  currency_code: USD
                  currency_symbol: $
                  currency_symbol_pos: left
                  currency_minor_unit: 2
                  currency_decimal_separator: .
                  currency_thousand_separator: ','
                  currency_prefix: $
                  currency_suffix: ''
                customer:
                  billing_address:
                    billing_first_name: John
                    billing_last_name: Doe
                    billing_company: Acme Corporation
                    billing_country: US
                    billing_address_1: 123 Main Street
                    billing_address_2: Suite 100
                    billing_postcode: '90210'
                    billing_city: Beverly Hills
                    billing_state: CA
                    billing_phone: +1-555-123-4567
                    billing_email: john.doe@example.com
                  shipping_address:
                    shipping_first_name: John
                    shipping_last_name: Doe
                    shipping_company: Acme Corporation
                    shipping_country: US
                    shipping_address_1: 123 Main Street
                    shipping_address_2: Suite 100
                    shipping_postcode: '90210'
                    shipping_city: Beverly Hills
                    shipping_state: CA
                items:
                  d6b3e8e5a1b0c6e4f2a3b1d8c5e6f9a2:
                    item_key: d6b3e8e5a1b0c6e4f2a3b1d8c5e6f9a2
                    id: 145
                    name: Wireless Bluetooth Headphones
                    title: Wireless Bluetooth Headphones
                    price: '1800'
                    quantity:
                      value: 2
                      minimum: 1
                      maximum: -1
                      multiple_of: 1
                      editable: true
                    totals:
                      subtotal: '3600'
                      subtotal_tax: '360'
                      total: '3600'
                      tax: '360'
                    slug: wireless-bluetooth-headphones
                    meta:
                      product_type: simple
                      sku: WBH-001
                      dimensions:
                        length: ''
                        width: ''
                        height: ''
                        unit: cm
                      weight: '0.5'
                      variation: {}
                    backorders: 'no'
                    cart_item_data: {}
                    featured_image: https://example-store.com/wp-content/uploads/2024/03/headphones-blue.jpg
                  f3a8b2c6d5e9f1a4b7c0d3e6f9a2b5c8:
                    item_key: f3a8b2c6d5e9f1a4b7c0d3e6f9a2b5c8
                    id: 289
                    name: Premium Cotton T-Shirt - Large, Navy Blue
                    title: Premium Cotton T-Shirt
                    price: '8000'
                    quantity:
                      value: 1
                      minimum: 1
                      maximum: 100
                      multiple_of: 1
                      editable: true
                    totals:
                      subtotal: '8000'
                      subtotal_tax: '800'
                      total: '8000'
                      tax: '800'
                    slug: premium-cotton-tshirt
                    meta:
                      product_type: variation
                      sku: PCT-LG-NB
                      dimensions:
                        length: '25'
                        width: '20'
                        height: '2'
                        unit: cm
                      weight: '0.2'
                      variation:
                        attribute_pa_size: Large
                        attribute_pa_color: Navy Blue
                    backorders: 'no'
                    cart_item_data: {}
                    featured_image: https://example-store.com/wp-content/uploads/2024/03/tshirt-navy.jpg
                item_count: 3
                items_weight: 1.5
                coupons:
                - coupon: SUMMER20
                  label: Summer Sale 20% Off
                  discount_type: percent
                  saving: $23.20
                  saving_html: <strong>$23.20</strong>
                needs_payment: true
                needs_shipping: true
                shipping:
                  total_packages: 1
                  show_package_details: true
                  has_calculated_shipping: true
                  packages:
                    default:
                      package_name: Shipping
                      rates:
                        flat_rate_1:
                          key: flat_rate:1
                          method_id: flat_rate
                          instance_id: 1
                          label: Flat Rate
                          cost: '10.00'
                          html: 'Flat Rate: $10.00'
                          taxes: '1.00'
                          chosen_method: true
                        free_shipping_2:
                          key: free_shipping:2
                          method_id: free_shipping
                          instance_id: 2
                          label: Free Shipping
                          cost: '0.00'
                          html: Free Shipping
                          taxes: '0.00'
                          chosen_method: false
                      package_details: Shipped from Main Warehouse
                      index: 0
                      chosen_method: flat_rate:1
                      formatted_destination: Beverly Hills, CA 90210, US
                fees:
                - name: Gift Wrapping
                  amount: 5.0
                  taxable: true
                  tax_class: standard
                  total: 5.0
                  tax: 0.5
                taxes:
                - label: Sales Tax
                  total: '1310'
                totals:
                  subtotal: '11600'
                  subtotal_tax: '1160'
                  shipping_total: '1000'
                  shipping_tax: '100'
                  shipping_taxes:
                  - 100
                  discount_total: '2320'
                  discount_tax: '0'
                  cart_contents_total: '9280'
                  cart_contents_tax: '1110'
                  cart_contents_taxes:
                  - 1110
                  fee_total: '500'
                  fee_tax: '50'
                  fee_taxes:
                  - 50
                  total: '11940'
                  total_tax: '1360'
                removed_items: []
                cross_sells:
                - id: 312
                  product_name: Wireless Charging Pad
                  product_title: Wireless Charging Pad
                  price: '2999'
                  regular_price: '3999'
                  sale_price: '2999'
                  product_image: https://example-store.com/wp-content/uploads/2024/03/charging-pad.jpg
                - id: 445
                  product_name: Phone Case - Universal
                  product_title: Phone Case - Universal
                  price: '1599'
                  regular_price: '1599'
                  sale_price: ''
                  product_image: https://example-store.com/wp-content/uploads/2024/03/phone-case.jpg
                extensions: {}
        '304':
          description: Not Modified - resource has not changed since last request.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
        '400':
          description: Bad request - invalid parameters provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_invalid_parameter
                message: Invalid cart_key parameter.
                data:
                  status: 400
        '404':
          description: Cart not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_cart_not_found
                message: Cart not found.
                data:
                  status: 404
    post:
      tags:
      - cart
      summary: Create cart
      description: |
        Creates a new cart session. Only available for guest customers. Logged-in users already have a cart session.
      responses:
        '200':
          description: Cart created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Success message.
                  cart_key:
                    type: string
                    description: Unique identifier for the new cart session.
              example:
                message: Cart created successfully.
                cart_key: cb7a23af96a3f23af3c28a8b4b8c6d5e
        '403':
          description: Forbidden - logged-in users already have a cart.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_cart_already_exists
                message: Cart already exists for this user.
                data:
                  status: 403
  /cart/add-item:
    post:
      tags:
      - cart-items
      summary: Add item to cart
      description: |
        Adds a single product item to the customer's cart.
      parameters:
      - name: formatted
        in: query
        description: Returns price values as a formatted string (e.g. "$18.00") when true. Defaults to false, returning raw numeric values (e.g. 1800).
        schema:
          type: boolean
          default: false
        required: false
      - $ref: '#/components/parameters/SkipCache'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  description: Unique identifier for the product or variation ID.
                  type: string
                quantity:
                  description: Quantity of this item to add to the cart.
                  type: string
                  default: '1'
                variation:
                  description: Variable attributes that identify the variation of the item.
                  type: object
                item_data:
                  description: Additional item data passed to make item unique.
                  type: object
                email:
                  description: Set the customers billing email address.
                  type: string
                  format: email
                phone:
                  description: Set the customers billing phone number.
                  type: string
                price:
                  description: |
                    Overrides the product price for this item. Only takes effect when the "Name Your Price" feature is enabled — either via the plugin settings page or the `cocart_does_product_allow_price_change` filter (defaults to false since v4.9.0). Silently ignored otherwise.
                  type: string
                return_item:
                  description: Returns the item details once added.
                  type: boolean
                  default: false
              required:
              - id
              - quantity
      responses:
        '200':
          description: Item added to cart successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/CartV2'
                  title: Default
                  description: Returns a full updated cart response.
                - $ref: '#/components/schemas/CartItem'
                  title: Item Only
                  description: Returns just the added item when return_item is true.
              examples:
                default:
                  summary: Full Cart Response
                  description: Returns complete cart when `return_item` is false or not provided (default behavior)
                  value:
                    cart_hash: e629fa6598d732768f7c726b4b621285
                    cart_key: cb7a23af96a3f23af3c28a8b4b8c6d5e
                    currency:
                      currency_code: USD
                      currency_symbol: $
                      currency_symbol_pos: left
                      currency_minor_unit: 2
                      currency_decimal_separator: .
                      currency_thousand_separator: ','
                      currency_prefix: $
                      currency_suffix: ''
                    customer:
                      billing_address:
                        billing_first_name: ''
                        billing_last_name: ''
                        billing_company: ''
                        billing_country: ''
                        billing_address_1: ''
                        billing_address_2: ''
                        billing_postcode: ''
                        billing_city: ''
                        billing_state: ''
                        billing_phone: ''
                        billing_email: ''
                      shipping_address:
                        shipping_first_name: ''
                        shipping_last_name: ''
                        shipping_company: ''
                        shipping_country: ''
                        shipping_address_1: ''
                        shipping_address_2: ''
                        shipping_postcode: ''
                        shipping_city: ''
                        shipping_state: ''
                    items:
                      a3c5e7f9b1d3e5f7a9b1c3d5e7f9a1b3:
                        item_key: a3c5e7f9b1d3e5f7a9b1c3d5e7f9a1b3
                        id: 145
                        name: Wireless Bluetooth Headphones
                        title: Wireless Bluetooth Headphones
                        price: '1800'
                        quantity:
                          value: 1
                          minimum: 1
                          maximum: -1
                          multiple_of: 1
                          editable: true
                        totals:
                          subtotal: '1800'
                          subtotal_tax: '0'
                          total: '1800'
                          tax: '0'
                        slug: wireless-bluetooth-headphones
                        meta:
                          product_type: simple
                          sku: WBH-001
                          dimensions:
                            length: ''
                            width: ''
                            height: ''
                            unit: cm
                          weight: '0.5'
                          variation: {}
                        backorders: 'no'
                        cart_item_data: {}
                        featured_image: https://example-store.com/wp-content/uploads/2024/03/headphones-blue.jpg
                    item_count: 1
                    items_weight: 0.5
                    coupons: []
                    needs_payment: true
                    needs_shipping: true
                    shipping:
                      total_packages: 0
                      show_package_details: true
                      has_calculated_shipping: false
                      packages: []
                    fees: []
                    taxes: []
                    totals:
                      subtotal: '1800'
                      subtotal_tax: '0'
                      fee_total: '0'
                      fee_tax: '0'
                      discount_total: '0'
                      discount_tax: '0'
                      shipping_total: '0'
                      shipping_tax: '0'
                      total: '1800'
                      total_tax: '0'
                    removed_items: []
                    cross_sells: []
                    notices:
                      success:
                      - Wireless Bluetooth Headphones has been added to your cart.
                item only:
                  summary: Single Item Response
                  description: Returns just the added item when return_item is true
                  value:
                    item_key: a3c5e7f9b1d3e5f7a9b1c3d5e7f9a1b3
                    id: 145
                    name: Wireless Bluetooth Headphones
                    title: Wireless Bluetooth Headphones
                    price: '1800'
                    quantity:
                      value: 1
                      minimum: 1
                      maximum: -1
                      multiple_of: 1
                      editable: true
                    totals:
                      subtotal: '1800'
                      subtotal_tax: '180'
                      total: '1800'
                      tax: '180'
                    slug: wireless-bluetooth-headphones
                    meta:
                      product_type: simple
                      sku: WBH-001
                      dimensions:
                        length: ''
                        width: ''
                        height: ''
                        unit: cm
                      weight: '0.5'
                      variation: {}
                    backorders: 'no'
                    cart_item_data: {}
                    featured_image: https://example-store.com/wp-content/uploads/2024/03/headphones-blue.jpg
        '400':
          description: Bad request - invalid parameters or product not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_invalid_product_id
                message: Invalid product ID provided.
                data:
                  status: 400
        '403':
          description: Cannot add product to cart.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_cannot_add_to_cart
                message: This product cannot be added to the cart.
                data:
                  status: 403
        '404':
          description: Product not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_product_not_found
                message: Product not found.
                data:
                  status: 404
  /cart/add-items:
    post:
      tags:
      - cart-items
      summary: Add multiple items to cart
      description: |
        Adds multiple product items to the customer's cart in a single request.
      parameters:
      - name: formatted
        in: query
        description: Returns price values as a formatted string (e.g. "$18.00") when true. Defaults to false, returning raw numeric values (e.g. 1800).
        schema:
          type: boolean
          default: false
        required: false
      - $ref: '#/components/parameters/SkipCache'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  description: Array of items to add to the cart.
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        description: Unique identifier for the product or variation ID.
                        type: string
                      quantity:
                        description: Quantity of this item to add to the cart.
                        type: string
                        default: '1'
                      variation:
                        description: Variable attributes that identify the variation of the item.
                        type: object
                      item_data:
                        description: Additional item data passed to make item unique.
                        type: object
                    required:
                    - id
                    - quantity
                email:
                  description: Set the customers billing email address.
                  type: string
                  format: email
                phone:
                  description: Set the customers billing phone number.
                  type: string
                return_items:
                  description: Returns the items details once added.
                  type: boolean
                  default: false
              required:
              - items
      responses:
        '200':
          description: Items added to cart successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                oneOf:
                - type: array
                  description: Returns array of added items when return_items is true.
                  items:
                    $ref: '#/components/schemas/CartItem'
                - $ref: '#/components/schemas/CartV2'
                  description: Returns full cart when return_items is false or not provided.
        '400':
          description: Bad request - invalid parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_invalid_items
                message: Invalid items array provided.
                data:
                  status: 400
        '403':
          description: One or more products cannot be added to cart.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_cannot_add_items
                message: One or more products cannot be added to the cart.
                data:
                  status: 403
  /cart/item/{item_key}:
    get:
      tags:
      - cart-items
      summary: Get cart item
      description: |
        Gets a specific item from the cart by its key.
      parameters:
      - name: item_key
        in: path
        description: Unique identifier for the cart item.
        required: true
        schema:
          type: string
          pattern: ^[\w-]{32}$
      - name: formatted
        in: query
        description: Returns price values as a formatted string (e.g. "$18.00") when true. Defaults to false, returning raw numeric values (e.g. 1800).
        schema:
          type: boolean
          default: false
        required: false
      - $ref: '#/components/parameters/IfNoneMatch'
      - $ref: '#/components/parameters/SkipCache'
      responses:
        '200':
          description: Cart item retrieved successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartItem'
              example:
                item_key: d6b3e8e5a1b0c6e4f2a3b1d8c5e6f9a2
                id: 145
                name: Wireless Bluetooth Headphones
                title: Wireless Bluetooth Headphones
                price: '1800'
                quantity:
                  value: 2
                  minimum: 1
                  maximum: -1
                  multiple_of: 1
                  editable: true
                totals:
                  subtotal: '3600'
                  subtotal_tax: '360'
                  total: '3600'
                  tax: '360'
                slug: wireless-bluetooth-headphones
                meta:
                  product_type: simple
                  sku: WBH-001
                  dimensions:
                    length: ''
                    width: ''
                    height: ''
                    unit: cm
                  weight: '0.5'
                  variation: {}
                backorders: 'no'
                cart_item_data: {}
                featured_image: https://example-store.com/wp-content/uploads/2024/03/headphones-blue.jpg
        '304':
          description: Not Modified - resource has not changed since last request.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
        '400':
          description: Bad request - invalid item key format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_invalid_item_key
                message: Invalid item key format.
                data:
                  status: 400
        '404':
          description: Cart item not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_item_not_found
                message: Cart item not found.
                data:
                  status: 404
    post:
      tags:
      - cart-items
      summary: Update cart item
      description: |
        Updates the quantity or other properties of a specific item in the customer's cart.
        By default returns the updated cart contents. Set return_status=true to get a status message with quantity info.
      parameters:
      - name: item_key
        in: path
        description: Unique identifier for the cart item.
        required: true
        schema:
          type: string
          pattern: ^[\w-]{32}$
      - name: formatted
        in: query
        description: Returns price values as a formatted string (e.g. "$18.00") when true. Defaults to false, returning raw numeric values (e.g. 1800).
        schema:
          type: boolean
          default: false
        required: false
      - $ref: '#/components/parameters/SkipCache'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  description: Quantity of this item to update to. Setting to 0 removes the item.
                  type: string
                id:
                  description: New variation ID to switch to.
                  type: integer
                variation:
                  description: New variation attributes to switch to.
                  type: object
                item_data:
                  description: Replace custom item data.
                  type: object
                return_status:
                  description: Returns a message and quantity value after updating item in cart.
                  type: boolean
                  default: false
              required:
              - quantity
      responses:
        '200':
          description: Cart item updated successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/CartV2'
                - type: object
                  title: Status Message
                  properties:
                    message:
                      type: string
                      example: Quantity for Product Name has been updated.
                    quantity:
                      type: integer
                      example: 3
        '400':
          description: Bad request - invalid parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_invalid_quantity
                message: Invalid quantity provided.
                data:
                  status: 400
        '404':
          description: Cart item not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_item_not_found
                message: Cart item not found.
                data:
                  status: 404
    put:
      tags:
      - cart-items
      summary: Restore cart item
      description: |
        Restores a previously removed item back to the customer's cart.
        By default returns the updated cart contents. Set return_item=true to get just the restored item details.
      parameters:
      - name: item_key
        in: path
        description: Unique identifier for the cart item.
        required: true
        schema:
          type: string
          pattern: ^[\w-]{32}$
      - name: formatted
        in: query
        description: Returns price values as a formatted string (e.g. "$18.00") when true. Defaults to false, returning raw numeric values (e.g. 1800).
        schema:
          type: boolean
          default: false
        required: false
      - name: return_item
        in: query
        description: Returns the item details once restored.
        schema:
          type: boolean
          default: false
        required: false
      - $ref: '#/components/parameters/SkipCache'
      responses:
        '200':
          description: Cart item restored successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/CartV2'
                - $ref: '#/components/schemas/CartItem'
        '400':
          description: Bad request - invalid item key format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_invalid_item_key
                message: Invalid item key format.
                data:
                  status: 400
        '403':
          description: Unable to restore item to the cart.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_cannot_restore_item
                message: Unable to restore this item to the cart.
                data:
                  status: 403
        '404':
          description: Cart item not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_item_not_found
                message: Cart item not found in removed items.
                data:
                  status: 404
    delete:
      tags:
      - cart-items
      summary: Remove cart item
      description: |
        Removes a specific item from the customer's cart.
        By default returns the updated cart contents. Set return_status=true to get just a removal message.
      parameters:
      - name: item_key
        in: path
        description: Unique identifier for the cart item.
        required: true
        schema:
          type: string
          pattern: ^[\w-]{32}$
      - name: formatted
        in: query
        description: Returns price values as a formatted string (e.g. "$18.00") when true. Defaults to false, returning raw numeric values (e.g. 1800).
        schema:
          type: boolean
          default: false
        required: false
      - name: return_status
        in: query
        description: Returns a message after removing item from cart.
        schema:
          type: boolean
          default: false
        required: false
      - $ref: '#/components/parameters/SkipCache'
      responses:
        '200':
          description: Cart item removed successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/CartV2'
                - type: string
                  example: Product Name has been removed from cart.
        '400':
          description: Bad request - invalid item key format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_invalid_item_key
                message: Invalid item key format.
                data:
                  status: 400
        '404':
          description: Cart item not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_item_not_found
                message: Cart item not found.
                data:
                  status: 404
  /cart/items:
    get:
      tags:
      - cart-items
      summary: Get all cart items
      description: |
        Gets all items in the customer's cart.
      parameters:
      - name: cart_key
        in: query
        description: Unique identifier for the cart/customer.
        schema:
          type: string
        required: false
      - name: thumb
        in: query
        description: Returns the URL of the product image thumbnail.
        schema:
          type: boolean
          default: true
        required: false
      - name: formatted
        in: query
        description: Returns price values as a formatted string (e.g. "$18.00") when true. Defaults to false, returning raw numeric values (e.g. 1800).
        schema:
          type: boolean
          default: false
        required: false
      - $ref: '#/components/parameters/IfNoneMatch'
      - $ref: '#/components/parameters/SkipCache'
      responses:
        '200':
          description: Cart items retrieved successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/CartItem'
              example:
                d6b3e8e5a1b0c6e4f2a3b1d8c5e6f9a2:
