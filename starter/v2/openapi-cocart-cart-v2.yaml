                  totals:
                    subtotal: '8000'
                    subtotal_tax: '800'
                    total: '8000'
                    tax: '800'
                  slug: premium-cotton-tshirt
                  meta:
                    product_type: variation
                    sku: PCT-LG-NB
                    dimensions:
                      length: '25'
