                  description: Keeps removed items in session when clearing the cart.
                  type: boolean
                  default: false
      responses:
        '200':
          description: Cart cleared successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartV2'
        '400':
          description: Bad request - invalid parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_invalid_parameter
                message: Invalid parameter provided.
                data:
                  status: 400
        '406':
          description: Cart clearing failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_clear_cart_failed
                message: Clearing the cart failed.
                data:
                  status: 406
  /cart/update:
    post:
      tags:
      - cart
      summary: Update cart
      description: |
        Updates the cart using a registered callback. Two built-in callbacks are available:

        - **`update-cart`** — Bulk-update item quantities. Pass a `quantity` map of `item_key` to new quantity.
        - **`update-customer`** — Update customer billing and/or shipping address details.

        Select the appropriate schema tab below based on which callback you are using.
      parameters:
      - name: formatted
        in: query
        description: Returns price values as a formatted string (e.g. "$18.00") when true. Defaults to false, returning raw numeric values (e.g. 1800).
        schema:
          type: boolean
          default: false
        required: false
      - $ref: '#/components/parameters/SkipCache'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              oneOf:
              - title: update-cart
                description: Bulk-update item quantities in the cart.
                type: object
                properties:
                  namespace:
                    description: Must be "update-cart".
                    type: string
                    enum:
                    - update-cart
                  quantity:
                    description: Map of item_key to new quantity. Items not listed are unchanged. Setting a quantity to 0 removes the item.
                    type: object
                    additionalProperties:
                      type: string
                    example:
                      d6b3e8e5a1b0c6e4f2a3b1d8c5e6f9a2: '3'
                      f3a8b2c6d5e9f1a4b7c0d3e6f9a2b5c8: '1'
                required:
                - namespace
              - title: update-customer
                description: Update customer billing and/or shipping address details.
                type: object
                properties:
                  namespace:
                    description: Must be "update-customer".
                    type: string
                    enum:
                    - update-customer
                  first_name:
                    description: Customers billing first name.
                    type: string
                  last_name:
                    description: Customers billing last name.
                    type: string
                  company:
                    description: Customers billing company name.
                    type: string
                  address_1:
                    description: Customers billing address line 1.
                    type: string
                  address_2:
                    description: Customers billing address line 2.
                    type: string
                  city:
                    description: Customers billing city.
                    type: string
                  state:
                    description: Customers billing state.
                    type: string
                  postcode:
                    description: Customers billing postcode or zip code.
                    type: string
                  country:
                    description: Customers billing country code (ISO 3166-1 alpha-2).
                    type: string
                  email:
                    description: Customers billing email address.
                    type: string
                    format: email
                  phone:
                    description: Customers billing phone number.
                    type: string
                  s_first_name:
                    description: Customers shipping first name.
                    type: string
                  s_last_name:
                    description: Customers shipping last name.
                    type: string
                  s_company:
                    description: Customers shipping company name.
                    type: string
                  s_address_1:
                    description: Customers shipping address line 1.
                    type: string
                  s_address_2:
                    description: Customers shipping address line 2.
                    type: string
                  s_city:
                    description: Customers shipping city.
                    type: string
                  s_state:
                    description: Customers shipping state.
                    type: string
                  s_postcode:
                    description: Customers shipping postcode or zip code.
                    type: string
                  s_country:
                    description: Customers shipping country code (ISO 3166-1 alpha-2).
                    type: string
                required:
                - namespace
      responses:
        '200':
          description: Cart updated successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartV2'
        '400':
          description: Bad request - invalid parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_invalid_parameter
                message: Invalid parameter provided.
                data:
                  status: 400
  /cart/totals:
    get:
      tags:
      - cart-calculate
      summary: Get cart totals
      description: |
        Retrieves the cart totals including subtotal, taxes, shipping, and discounts.
      parameters:
      - name: html
        in: query
        description: Returns the totals pre-formatted as HTML strings (includes currency symbol).
        schema:
          type: boolean
          default: false
        required: false
      - name: formatted
        in: query
        description: Returns price values as a formatted string (e.g. "$18.00") when true. Defaults to false, returning raw numeric values (e.g. 1800).
        schema:
          type: boolean
          default: false
        required: false
      - $ref: '#/components/parameters/IfNoneMatch'
      - $ref: '#/components/parameters/SkipCache'
      responses:
        '200':
          description: Cart totals retrieved successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotalsResponse'
              example:
                subtotal: '11600'
                subtotal_tax: '1160'
                shipping_total: '1000'
                shipping_tax: '100'
                shipping_taxes:
                - 100
                discount_total: '2320'
                discount_tax: '0'
                cart_contents_total: '9280'
                cart_contents_tax: '1110'
                cart_contents_taxes:
                - 1110
                fee_total: '500'
                fee_tax: '50'
                fee_taxes:
                - 50
                total: '11940'
                total_tax: '1360'
        '304':
          description: Not Modified - resource has not changed since last request.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
        '400':
          description: Bad request - invalid parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_invalid_parameter
                message: Invalid parameter provided.
                data:
                  status: 400
  /cart/calculate:
    post:
      tags:
      - cart-calculate
      summary: Calculate cart totals
      description: |
        Calculates the cart totals including taxes, shipping, and discounts.
      parameters:
      - name: formatted
        in: query
        description: Returns price values as a formatted string (e.g. "$18.00") when true. Defaults to false, returning raw numeric values (e.g. 1800).
        schema:
          type: boolean
          default: false
        required: false
      - $ref: '#/components/parameters/SkipCache'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                return_totals:
                  description: Returns the cart totals once calculated.
                  type: boolean
                  default: false
      responses:
        '200':
          description: Cart totals calculated successfully.
          headers:
            ETag:
              $ref: '#/components/headers/ETagHeader'
            CoCart-Cache:
              $ref: '#/components/headers/CoCartCacheHeader'
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/CartTotals'
                  description: Cart totals when return_totals is true.
                - $ref: '#/components/schemas/CartV2'
                  description: Full cart when return_totals is false or not provided.
        '400':
          description: Bad request - invalid parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: cocart_invalid_parameter
                message: Invalid parameter provided.
                data:
                  status: 400
components:
  headers:
    ETagHeader:
      description: |
        Weak ETag cache validation token. Format: W/"<md5hash>". Use in If-None-Match on subsequent requests for conditional GET.
      schema:
        type: string
        pattern: ^W/"[a-f0-9]{32}"$
        example: W/"d41d8cd98f00b204e9800998ecf8427e"
    CoCartCacheHeader:
      description: |
        ETag cache status: HIT (304 returned), MISS (fresh response), SKIP (_skip_cache used).
      schema:
        type: string
        enum:
        - HIT
        - MISS
        - SKIP
        example: MISS
  parameters:
    IfNoneMatch:
      name: If-None-Match
      in: header
      description: |
        Conditional request header. Send previous ETag value; server returns 304 Not Modified if resource unchanged.
      required: false
      schema:
        type: string
        example: W/"d41d8cd98f00b204e9800998ecf8427e"
    SkipCache:
      name: _skip_cache
      in: query
      description: |
        Set to true or 1 to bypass ETag checking. Forces full response with CoCart-Cache: SKIP header.
      required: false
      schema:
        type: string
        enum:
        - 'true'
        - '1'
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        Basic authentication with username and password.

        Since v4.9.0, if an `X-HTTP-Method-Override` header is present, it is honored when
        determining the request method during authentication (e.g. credentials sent in a
        JSON body are still detected when the original method is tunneled through POST).
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer token authentication (JWT). Optional for cart and products endpoints.
        When provided by customers, enables enhanced functionality like persistent carts and user-specific data.
        Required only for admin operations like managing cart sessions.
  schemas:
    CartV2:
      type: object
      description: Complete cart object with enhanced v2 structure.
      properties:
        cart_hash:
          type: string
          description: Unique cart hash.
        cart_key:
          type: string
          description: Unique cart key for the customer.
        currency:
          $ref: '#/components/schemas/Currency'
        customer:
          $ref: '#/components/schemas/Customer'
        items:
          type: object
          description: Cart items indexed by item key.
          additionalProperties:
            $ref: '#/components/schemas/CartItem'
        item_count:
          type: integer
          description: Total number of items in cart.
        items_weight:
          type: number
          description: Total weight of all items.
        coupons:
          type: array
          description: Applied coupons.
          items:
            $ref: '#/components/schemas/AppliedCoupon'
        needs_payment:
          type: boolean
          description: Whether the cart needs payment.
        needs_shipping:
          type: boolean
          description: Whether the cart needs shipping.
        shipping:
          $ref: '#/components/schemas/Shipping'
        fees:
          type: array
          description: Cart fees.
          items:
            $ref: '#/components/schemas/CartFee'
        taxes:
          type: array
          description: Cart taxes.
          items:
            $ref: '#/components/schemas/CartTax'
        totals:
          $ref: '#/components/schemas/CartTotals'
        removed_items:
          type: array
          description: Recently removed items that can be restored.
          items:
            $ref: '#/components/schemas/RemovedItem'
        cross_sells:
          type: array
          description: Cross-sell products.
          items:
            $ref: '#/components/schemas/CrossSellItem'
        notices:
          type: object
          description: Cart notices and messages.
          additionalProperties: true
        extensions:
          type: object
          description: Additional data added by third-party extensions via the `cocart_cart_extensions` filter. Only present when at least one extension hooks this filter.
          additionalProperties: true
    CartItem:
      type: object
      properties:
        item_key:
          type: string
          description: Unique identifier for the item within the cart.
        id:
          type: integer
          description: Product ID.
        name:
          type: string
          description: Product name.
        title:
          type: string
          description: Product title.
        price:
          type: string
          description: Current product price. Raw numeric value (e.g. "1800") by default; formatted string (e.g. "$18.00") when the `formatted` query parameter is true.
        quantity:
          type: object
          description: Quantity information for this item.
          properties:
            value:
              type: number
              description: Current quantity of the item in the cart.
            minimum:
              type: number
              description: The minimum purchase amount required.
            maximum:
              type: number
              description: The maximum purchase amount allowed. If -1 the item has an unlimited purchase amount.
            multiple_of:
              type: number
              description: The quantity must be a multiple of this value.
            editable:
              type: boolean
              description: Whether the quantity of the item is editable.
        totals:
          type: object
          description: Item totals. All values are raw numeric strings (e.g. "3600") by default; formatted strings (e.g. "$36.00") when `formatted=true`.
          properties:
            subtotal:
              type: string
              description: Line subtotal (before discounts).
            subtotal_tax:
              type: string
              description: Line subtotal tax.
            total:
              type: string
              description: Line total (after discounts).
            tax:
              type: string
              description: Line total tax.
        slug:
          type: string
          description: Product slug.
        meta:
          type: object
          description: Item metadata.
          properties:
            product_type:
              type: string
              description: Product type.
            sku:
              type: string
              description: Product SKU.
            dimensions:
              type: object
              description: Product dimensions.
              properties:
                length:
                  type: string
                  description: Product length.
                width:
                  type: string
                  description: Product width.
                height:
                  type: string
                  description: Product height.
                unit:
                  type: string
                  description: Dimension unit.
            weight:
              type: string
              description: Product weight.
            variation:
              description: Chosen attributes (for variations).
              oneOf:
              - type: object
                additionalProperties:
                  type: string
              - type: array
                items:
                  type: string
          additionalProperties: true
        backorders:
          type: string
          description: Backorder status.
        cart_item_data:
          type: object
          description: Custom cart item data.
          additionalProperties: true
        featured_image:
          type: string
          description: Product featured image URL.
        extensions:
          type: object
          description: Additional data added by third-party extensions via the `cocart_cart_item_extensions` filter. Empty object when no extensions hook this filter.
          additionalProperties: true
    Currency:
      type: object
      properties:
        currency_code:
          type: string
          description: Currency code.
        currency_symbol:
          type: string
          description: Currency symbol.
        currency_symbol_pos:
          type: string
          description: Currency symbol position.
        currency_minor_unit:
          type: integer
          description: Currency minor unit.
        currency_decimal_separator:
          type: string
          description: Currency decimal separator.
        currency_thousand_separator:
          type: string
          description: Currency thousand separator.
        currency_prefix:
          type: string
          description: Currency prefix.
        currency_suffix:
          type: string
          description: Currency suffix.
    Customer:
      type: object
      properties:
        billing_address:
          $ref: '#/components/schemas/BillingAddress'
        shipping_address:
          $ref: '#/components/schemas/ShippingAddress'
    BillingAddress:
      type: object
      properties:
        billing_first_name:
          type: string
        billing_last_name:
          type: string
        billing_company:
          type: string
        billing_country:
          type: string
        billing_address_1:
          type: string
        billing_address_2:
          type: string
        billing_postcode:
          type: string
        billing_city:
          type: string
        billing_state:
          type: string
        billing_phone:
          type: string
        billing_email:
          type: string
    ShippingAddress:
      type: object
      properties:
        shipping_first_name:
          type: string
        shipping_last_name:
          type: string
        shipping_company:
          type: string
        shipping_country:
          type: string
        shipping_address_1:
          type: string
        shipping_address_2:
          type: string
        shipping_postcode:
          type: string
        shipping_city:
          type: string
        shipping_state:
          type: string
    Shipping:
      type: object
      properties:
        total_packages:
          type: integer
          description: Number of shipping packages.
        show_package_details:
          type: boolean
          description: Whether to show package details.
        has_calculated_shipping:
          type: boolean
          description: Whether shipping has been calculated.
        packages:
          type: object
          description: Shipping packages.
          additionalProperties:
            $ref: '#/components/schemas/ShippingPackage'
    ShippingPackage:
      type: object
      properties:
        package_name:
          type: string
          description: Package name.
        rates:
          type: object
          description: Available shipping rates.
          additionalProperties:
            $ref: '#/components/schemas/ShippingRate'
        package_details:
          type: string
          description: Package details.
        index:
          type: integer
          description: Package index.
        chosen_method:
          type: string
          description: Chosen shipping method.
        formatted_destination:
          type: string
          description: Formatted destination address.
    ShippingRate:
      type: object
      properties:
        key:
          type: string
        method_id:
          type: string
        instance_id:
          type: integer
        label:
          type: string
        cost:
          type: string
        html:
          type: string
        taxes:
          type: string
        chosen_method:
          type: boolean
    CartTotals:
      type: object
      description: All monetary values are raw numeric strings (e.g. "1800") by default. Pass `formatted=true` to receive formatted strings (e.g. "$18.00").
      properties:
        subtotal:
          type: string
          description: Cart subtotal.
        subtotal_tax:
          type: string
          description: Cart subtotal tax.
        shipping_total:
          type: string
          description: Shipping total.
        shipping_tax:
          type: string
          description: Shipping tax.
        shipping_taxes:
          type: array
          items:
            type: number
        discount_total:
          type: string
          description: Discount total.
        discount_tax:
          type: string
          description: Discount tax.
        cart_contents_total:
          type: string
          description: Cart contents total.
        cart_contents_tax:
          type: string
          description: Cart contents tax.
        cart_contents_taxes:
          type: array
          items:
            type: number
        fee_total:
          type: string
          description: Fee total.
        fee_tax:
          type: string
          description: Fee tax.
        fee_taxes:
          type: array
          items:
            type: number
        total:
          type: string
          description: Cart total.
        total_tax:
          type: string
          description: Total tax.
    CartFee:
      type: object
      properties:
        name:
          type: string
        amount:
          type: number
        taxable:
          type: boolean
        tax_class:
          type: string
        total:
          type: number
        tax:
          type: number
    CartTax:
      type: object
      description: |
        Tax entry. Structure depends on the WooCommerce tax display setting:
        - Non-itemized: `{ label, total }` — a single combined tax line.
        - Itemized: `{ name, price }` — one entry per tax rate.
      properties:
        label:
          type: string
          description: Tax label (non-itemized mode).
        total:
          type: string
          description: Combined tax total as raw numeric string, e.g. "1310" (non-itemized mode). Formatted string when `formatted=true`.
        name:
          type: string
          description: Tax rate name (itemized mode).
        price:
          type: string
          description: Tax amount as raw numeric string (itemized mode). Formatted string when `formatted=true`.
    AppliedCoupon:
      type: object
      properties:
        coupon:
          type: string
          description: Coupon code.
        label:
          type: string
          description: Human-readable coupon label.
        discount_type:
          type: string
          description: Type of discount applied (e.g. percent, fixed_cart, fixed_product).
        saving:
          type: string
          description: Amount saved by this coupon, formatted without HTML.
        saving_html:
          type: string
          description: Amount saved by this coupon, formatted as HTML.
    RemovedItem:
      type: object
      properties:
        key:
          type: string
        product_id:
          type: integer
        quantity:
          type: integer
        name:
          type: string
    CrossSellItem:
      type: object
      properties:
        id:
          type: integer
        product_name:
          type: string
        product_title:
          type: string
        price:
          type: string
          description: Current price. Raw numeric string (e.g. "1800") by default; formatted string (e.g. "$18.00") when `formatted=true`.
        regular_price:
          type: string
          description: Regular price. Raw numeric string by default; formatted when `formatted=true`.
        sale_price:
          type: string
          description: Sale price if on sale, otherwise empty string. Raw numeric string by default; formatted when `formatted=true`.
        product_image:
          type: string
    TotalsResponse:
      allOf:
      - $ref: '#/components/schemas/CartTotals'
    ErrorResponse:
      type: object
      description: Standard error response structure.
      properties:
        code:
          type: string
          description: Machine-readable error code.
          example: cocart_invalid_parameter
        message:
          type: string
          description: Human-readable error message.
          example: Invalid parameter provided.
        data:
          type: object
          description: Additional error data.
          properties:
            status:
              type: integer
              description: HTTP status code.
              example: 400
            params:
              type: object
              description: Parameter-specific error details.
              additionalProperties: true
            field:
              type: string
              description: The parameter name that failed validation. Present on billing/shipping field validation errors from the update-customer callback.
            value:
              type: string
              description: The invalid value that was submitted. Present alongside `field` on validation errors.
          additionalProperties: true
