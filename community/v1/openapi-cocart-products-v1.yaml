        parent_id:
          type: integer
          description: Product parent ID.
          readOnly: true
        categories:
          type: array
          description: List of product categories.
          readOnly: true
          items:
            type: object
            properties:
              id:
                type: integer
                description: Category ID.
                readOnly: true
              name:
                type: string
                description: Category name.
                readOnly: true
              slug:
                type: string
                description: Category slug.
                readOnly: true
        tags:
          type: array
          description: List of product tags.
          readOnly: true
          items:
            type: object
            properties:
              id:
                type: integer
                description: Tag ID.
                readOnly: true
              name:
                type: string
                description: Tag name.
                readOnly: true
              slug:
                type: string
                description: Tag slug.
                readOnly: true
        images:
          type: array
          description: List of product images.
          readOnly: true
          items:
